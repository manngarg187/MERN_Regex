<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <h2 class="logo">NETFLIX</h2>
        <button class="signin">Sign In</button>
    </div>

    <!-- Hero -->
    <div class="hero">
        <div class="overlay"></div>

        <div class="hero-content">
            <h1>Unlimited movies, TV shows and more</h1>
            <p>Watch anywhere. Cancel anytime.</p>

            <div class="cta">
                <input type="text" placeholder="Email address">
                <button>Get Started ></button>
            </div>
        </div>
    </div>

    <!-- Rows -->
    <div class="row">
        <h2>Trending Now</h2>
        <div class="row-posters">
            <img src="https://image.tmdb.org/t/p/w500/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg">
            <img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg">
            <img src="https://image.tmdb.org/t/p/w500/5KCVkau1HEl7ZzfPsKAPM0sMiKc.jpg">
            <img src="https://image.tmdb.org/t/p/w500/6agKYU5IQFpuDyUYPu39w7UCRrJ.jpg">
        </div>
    </div>

    <div class="row">
        <h2>Top Rated</h2>
        <div class="row-posters">
            <img src="https://image.tmdb.org/t/p/w500/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg">
            <img src="https://image.tmdb.org/t/p/w500/9O1Iy9od7K0F2UjF1JvB6H9tJt.jpg">
            <img src="https://image.tmdb.org/t/p/w500/6ELCZlTA5lGUops70hKdB83WJxH.jpg">
            <img src="https://image.tmdb.org/t/p/w500/2CAL2433ZeIihfX1Hb2139CX0pW.jpg">
        </div>
    </div>

</body>

</html>
