<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>VS Code Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <body>

        <!-- Menu Bar -->
        <div class="menu-bar">
            <span>File</span>
            <span>Edit</span>
            <span>Selection</span>
            <span>View</span>
            <span>Go</span>
            <span>Run</span>
            <span>Help</span>
        </div>

        <div class="container">

            <!-- Activity Bar -->
            <div class="activity-bar">
                <i class="fas fa-file"></i>
                <i class="fas fa-search"></i>
                <i class="fas fa-code-branch"></i>
                <i class="fas fa-bug"></i>
                <i class="fas fa-cog"></i>
            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <h3>EXPLORER</h3>

                <div class="folder">
                    <div class="folder-title">📂 project</div>

                    <ul>
                        <li>📄 index.html</li>
                        <li>📄 style.css</li>
                        <li>📄 script.js</li>

                        <li class="folder-title">📂 assets</li>
                        <ul class="nested">
                            <li>📄 logo.png</li>
                            <li>📄 bg.jpg</li>
                        </ul>
                    </ul>
                </div>
            </div>

            <!-- Editor Section -->
            <div class="editor-section">

                <!-- Tabs -->
                <div class="tabs">
                    <div class="tab active">index.html ✖</div>
                    <div class="tab">style.css ✖</div>
                    <div class="tab">script.js ✖</div>
                </div>

                <!-- Editor -->
                <div class="editor">
                    <p>// Your code starts here...</p>
                </div>

            </div>

        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <span>Ln 1, Col 1</span>
            <span>UTF-8</span>
            <span>Spaces: 2</span>
        </div>

    </body>
</body>

</html>
