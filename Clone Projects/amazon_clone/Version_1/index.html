<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Amazon Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="nav-left">
      <div class="logo">Amazon</div>
      <div class="location">Deliver to India</div>
    </div>

    <div class="search">
      <input type="text" placeholder="Search Amazon">
      <button>🔍</button>
    </div>

    <div class="nav-right">
      <div>Sign In</div>
      <div>Orders</div>
      <div class="cart">🛒 Cart</div>
    </div>
  </div>

  <!-- Menu -->
  <div class="menu">
    <span>All</span>
    <span>Today's Deals</span>
    <span>Mobiles</span>
    <span>Fashion</span>
    <span>Electronics</span>
  </div>

  <!-- Hero Banner -->
  <div class="hero"></div>

  <!-- Products -->
  <div class="products">

    <div class="card">
      <h3>Electronics</h3>
      <img src="https://images.unsplash.com/photo-1510557880182-3a935c6bba0d">
    </div>

    <div class="card">
      <h3>Fashion</h3>
      <img src="https://images.unsplash.com/photo-1521335629791-ce4aec67dd53">
    </div>

    <div class="card">
      <h3>Home Decor</h3>
      <img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511">
    </div>

    <div class="card">
      <h3>Beauty</h3>
      <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
    </div>

  </div>

</body>
</html>
